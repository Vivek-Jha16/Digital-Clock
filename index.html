<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Clock</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --orange-core:   #FF6B1A;
            --orange-mid:    #FF8C42;
            --orange-soft:   #FFB380;
            --orange-pale:   #FFD9BF;
            --cream:         #FFF8F2;
            --white:         #FFFFFF;
            --dark:          #1A0F08;
            --text-muted:    #A07858;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--dark);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* ── Ring Light Structure ── */
        .ring-stage {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            z-index: 0;
        }

        .ring {
            position: absolute;
            border-radius: 50%;
            border-style: solid;
            border-color: transparent;
            transform-origin: center;
        }

        /* Outer faint halo */
        .ring-1 {
            width: min(92vw, 700px);
            height: min(92vw, 700px);
            border-width: 2px;
            border-color: rgba(255, 107, 26, 0.12);
            box-shadow:
                0 0 60px 6px rgba(255, 107, 26, 0.07),
                inset 0 0 60px 6px rgba(255, 107, 26, 0.05);
            animation: ring-breathe 6s ease-in-out infinite;
        }

        /* Main bright ring — orange arc segments */
        .ring-2 {
            width: min(76vw, 580px);
            height: min(76vw, 580px);
            border-width: 18px;
            border-color: var(--orange-core) var(--orange-mid) var(--orange-soft) var(--orange-pale);
            box-shadow:
                0 0 40px 12px rgba(255, 107, 26, 0.35),
                0 0 80px 30px rgba(255, 107, 26, 0.15),
                inset 0 0 40px 8px rgba(255, 140, 66, 0.12);
            animation: ring-spin 18s linear infinite;
        }

        /* Inner rim */
        .ring-3 {
            width: min(64vw, 490px);
            height: min(64vw, 490px);
            border-width: 6px;
            border-color: rgba(255, 179, 128, 0.25) rgba(255, 107, 26, 0.4) rgba(255, 179, 128, 0.25) rgba(255, 107, 26, 0.1);
            animation: ring-spin 10s linear infinite reverse;
        }

        /* White highlight arc */
        .ring-4 {
            width: min(54vw, 410px);
            height: min(54vw, 410px);
            border-width: 2px;
            border-color: rgba(255, 255, 255, 0.12) rgba(255, 255, 255, 0.28) rgba(255, 255, 255, 0.12) transparent;
            animation: ring-spin 14s linear infinite;
        }

        /* Tiny inner ring */
        .ring-5 {
            width: min(46vw, 350px);
            height: min(46vw, 350px);
            border-width: 1px;
            border-color: rgba(255, 107, 26, 0.15);
            box-shadow: 0 0 20px 4px rgba(255, 107, 26, 0.06);
        }

        /* Central glow burst */
        .ring-burst {
            position: absolute;
            width: min(38vw, 290px);
            height: min(38vw, 290px);
            border-radius: 50%;
            background: radial-gradient(
                circle,
                rgba(255, 140, 66, 0.08) 0%,
                rgba(255, 107, 26, 0.05) 40%,
                transparent 70%
            );
            animation: ring-breathe 4s ease-in-out infinite alternate;
        }

        /* Bright dots on main ring */
        .ring-dot {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--orange-core);
            box-shadow: 0 0 12px 4px rgba(255, 107, 26, 0.6);
        }
        .ring-dot:nth-child(1) { top: -5px;  left: calc(50% - 5px); }
        .ring-dot:nth-child(2) { bottom: -5px; left: calc(50% - 5px); }
        .ring-dot:nth-child(3) { left: -5px; top: calc(50% - 5px); }
        .ring-dot:nth-child(4) { right: -5px; top: calc(50% - 5px); }

        @keyframes ring-spin {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }
        @keyframes ring-breathe {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50%       { opacity: 1;   transform: scale(1.015); }
        }

        /* Floor reflection */
        .floor-glow {
            position: fixed;
            bottom: 0; left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 120px;
            background: radial-gradient(ellipse at center bottom,
                rgba(255, 107, 26, 0.18) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* ── Clock Card ── */
        .clock-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            padding: 1rem;
        }

        .clock-card {
            background: rgba(255, 248, 242, 0.04);
            border: 1px solid rgba(255, 179, 128, 0.18);
            border-radius: 28px;
            padding: 2.75rem 3rem 2.25rem;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            box-shadow:
                0 0 0 1px rgba(255, 107, 26, 0.06),
                0 32px 64px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.06);
            max-width: 520px;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
        }

        .clock-card::before {
            content: '';
            position: absolute;
            top: 0; left: 15%; right: 15%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 140, 66, 0.6), transparent);
        }

        .clock-card::after {
            content: '';
            position: absolute;
            top: -40px; left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 120px;
            background: radial-gradient(ellipse, rgba(255, 107, 26, 0.07) 0%, transparent 70%);
            pointer-events: none;
        }

        /* Status row */
        .status-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.6rem;
        }

        .live-pill {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 107, 26, 0.12);
            border: 1px solid rgba(255, 107, 26, 0.25);
            border-radius: 999px;
            padding: 4px 12px 4px 8px;
            font-size: 0.68rem;
            font-weight: 600;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--orange-soft);
        }

        .live-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--orange-core);
            box-shadow: 0 0 6px 2px rgba(255, 107, 26, 0.5);
            animation: blink-dot 1.1s step-start infinite;
        }

        @keyframes blink-dot {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.2; }
        }

        .tz-label {
            font-size: 0.72rem;
            color: var(--text-muted);
            letter-spacing: 0.04em;
        }
        .tz-label strong {
            color: rgba(255, 217, 191, 0.7);
            font-weight: 500;
        }

        /* Time display */
        .time-sublabel {
            font-size: 0.68rem;
            font-weight: 500;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 0.6rem;
        }

        #watch {
            display: block;
            font-family: 'DM Mono', monospace;
            font-size: clamp(3rem, 13vw, 5.8rem);
            font-weight: 300;
            color: var(--cream);
            letter-spacing: -0.03em;
            line-height: 1;
            margin-bottom: 1.5rem;
            text-shadow:
                0 0 30px rgba(255, 140, 66, 0.25),
                0 0 60px rgba(255, 107, 26, 0.12);
        }

        /* Divider */
        .card-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 140, 66, 0.2), transparent);
            margin: 0 0 1.25rem;
        }

        /* Meta chips */
        .meta-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.6rem;
        }

        .meta-chip {
            display: flex;
            align-items: center;
            gap: 7px;
        }

        .meta-chip-icon {
            width: 28px; height: 28px;
            border-radius: 8px;
            background: rgba(255, 107, 26, 0.1);
            border: 1px solid rgba(255, 107, 26, 0.18);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .meta-chip-icon svg {
            width: 13px; height: 13px;
            stroke: var(--orange-soft);
            fill: none;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .meta-chip-text { font-size: 0.75rem; color: var(--text-muted); }
        .meta-chip-text strong {
            display: block;
            font-size: 0.8rem;
            color: rgba(255, 248, 242, 0.75);
            font-weight: 500;
        }

        /* Seconds progress bar */
        .seconds-bar-wrap { margin-top: 1.5rem; }

        .seconds-bar-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.65rem;
            color: var(--text-muted);
            letter-spacing: 0.08em;
            margin-bottom: 6px;
        }

        .seconds-bar-track {
            height: 3px;
            background: rgba(255, 140, 66, 0.1);
            border-radius: 999px;
            overflow: hidden;
        }

        .seconds-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--orange-core), var(--orange-pale));
            border-radius: 999px;
            transition: width 0.95s linear;
            box-shadow: 0 0 6px 1px rgba(255, 107, 26, 0.4);
        }

        @media (max-width: 480px) {
            .clock-card { padding: 2rem 1.5rem 1.75rem; border-radius: 20px; }
            .ring-2 { border-width: 12px; }
            .meta-row { gap: 0.9rem; }
        }
    </style>

    <script src="script.js" defer></script>
</head>
<body>

<!-- Ring Light Background -->
<div class="ring-stage" aria-hidden="true">
    <div class="ring ring-1"></div>
    <div class="ring ring-2">
        <div class="ring-dot"></div>
        <div class="ring-dot"></div>
        <div class="ring-dot"></div>
        <div class="ring-dot"></div>
    </div>
    <div class="ring ring-3"></div>
    <div class="ring ring-4"></div>
    <div class="ring ring-5"></div>
    <div class="ring-burst"></div>
</div>
<div class="floor-glow" aria-hidden="true"></div>

<!-- Clock Card -->
<div class="clock-wrapper">
    <div class="clock-card">

        <div class="status-row">
            <div class="live-pill">
                <div class="live-dot"></div>
                Live
            </div>
            <span class="tz-label">Zone &nbsp;<strong id="tz">—</strong></span>
        </div>

        <p class="time-sublabel">Current Time</p>
        <span id="watch">--:--:--</span>

        <div class="card-divider"></div>

        <div class="meta-row">
            <div class="meta-chip">
                <div class="meta-chip-icon">
                    <svg viewBox="0 0 16 16"><rect x="1" y="3" width="14" height="12" rx="2"/><path d="M5 1v4M11 1v4M1 7h14"/></svg>
                </div>
                <div class="meta-chip-text">
                    <span>Date</span>
                    <strong id="date-display">—</strong>
                </div>
            </div>

            <div class="meta-chip">
                <div class="meta-chip-icon">
                    <svg viewBox="0 0 16 16"><circle cx="8" cy="8" r="6"/><path d="M8 5v3l2 2"/></svg>
                </div>
                <div class="meta-chip-text">
                    <span>Format</span>
                    <strong>24-Hour</strong>
                </div>
            </div>

            <div class="meta-chip">
                <div class="meta-chip-icon">
                    <svg viewBox="0 0 16 16"><circle cx="8" cy="8" r="6"/><path d="M8 2c-2 2-2 8 0 12M8 2c2 2 2 8 0 12M2 8h12"/></svg>
                </div>
                <div class="meta-chip-text">
                    <span>Precision</span>
                    <strong>1-Second</strong>
                </div>
            </div>
        </div>

        <div class="seconds-bar-wrap">
            <div class="seconds-bar-label">
                <span>Minute Progress</span>
                <span id="sec-label">0s / 60s</span>
            </div>
            <div class="seconds-bar-track">
                <div class="seconds-bar-fill" id="sec-bar" style="width:0%"></div>
            </div>
        </div>

    </div>
</div>

<script>
    (function () {
        const tzEl     = document.getElementById('tz');
        const dateEl   = document.getElementById('date-display');
        const secBar   = document.getElementById('sec-bar');
        const secLabel = document.getElementById('sec-label');

        function updateMeta() {
            const now = new Date();
            tzEl.textContent = Intl.DateTimeFormat().resolvedOptions().timeZone || 'Local';
            dateEl.textContent = now.toLocaleDateString(undefined, {
                weekday: 'short', year: 'numeric', month: 'short', day: 'numeric'
            });
            const s = now.getSeconds();
            secBar.style.width = ((s / 60) * 100) + '%';
            secLabel.textContent = s + 's / 60s';
        }

        updateMeta();
        setInterval(updateMeta, 1000);
    })();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
